name: Code Coverage
permissions:
  contents: read
  actions: write
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_call:
jobs:
  coverage-report:
    runs-on: ubuntu-24.04
    steps:
      - uses: eclipse-score/more-disk-space@6a3b48901846bf7f8cc985925157d71a8973e61f # v1
        with:
          level: 4
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}
      # Evaluation of the llvm-cov coverage + justification solution ported from
      # eclipse-score/communication#549. C++ coverage is produced with the LLVM
      # toolchain (source-based instrumentation) instead of gcov+genhtml, over the
      # whole //score tree (issue #289).
      #
      # A few tests are excluded because they are incompatible with llvm-cov
      # source-based instrumentation (they pass under the old gcov flow):
      #   - aborts_upon_exception:* abort/death tests, where the immediate abort()
      #     races with llvm-cov continuous-mode counter writeback.
      #   - safe_math floating_point_environment_test, where the injected counter
      #     code perturbs the floating-point status flags the test inspects.
      #   - os network_interface_test, which reports a leaked mock at the
      #     instrumentation-altered exit path.
      - name: Run llvm-cov Coverage
        run: |
          bazel coverage --config=bl-cov-x86_64-linux -- //score/... \
            -//score/language/safecpp/aborts_upon_exception:abortsuponexception_toolchain_test \
            -//score/language/safecpp/aborts_upon_exception:abortsuponexception_lib_test \
            -//score/language/safecpp/safe_math/details:floating_point_environment_test \
            -//score/os/linux/utils/test:network_interface_test
      - name: Generate HTML Coverage Report
        run: |
          bazel run //quality/coverage:generate_coverage_html
        shell: bash
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}_cpp_coverage_report
          path: cpp_coverage/
          include-hidden-files: true
          retention-days: 10
