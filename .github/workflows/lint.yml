name: Linter checks
permissions:
  contents: read
  actions: write
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_call:
jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: eclipse-score/more-disk-space@6a3b48901846bf7f8cc985925157d71a8973e61f # v1
        with:
          level: 4
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}
      - name: Bazel Build with clang-tidy
        run: |
          bazel build --config clang_tidy -- //...
  lint-clippy:
    uses: eclipse-score/cicd-workflows/.github/workflows/static-analysis.yml@af347722c7ae3ed85518895c11268d96ac728f62
    with:
      # Use only Rust targets for build.
      bazel-targets: "$(bazel query 'kind(\"rust_.*\", //score/...)' | xargs)"
      bazel-config: "lint"
