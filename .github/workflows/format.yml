name: Formatting checks
permissions:
  contents: read
  actions: write
on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
jobs:
  formatting-check:
    uses: eclipse-score/cicd-workflows/.github/workflows/format.yml@af347722c7ae3ed85518895c11268d96ac728f62
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}
      - name: Bazel Build with clang-format
        run: |
          bazel build --config clang_format -- //... || true
