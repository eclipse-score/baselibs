name: Bazel Build (Linux)
permissions:
  contents: read
  actions: write
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_call:
jobs:
  linux-build-and-test:
    name: Build and Test ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bl-x86_64-linux
            bazel-config: bl-x86_64-linux
            working-directory: "."
            bazel-build-target: "//..."
            bazel-test-target: >-
              //...
              -//score/language/safecpp/aborts_upon_exception:abortsuponexception_toolchain_test
            bazel-test-extra-flags: ""
          - name: bl-aarch64-linux
            bazel-config: bl-aarch64-linux
            working-directory: "."
            bazel-build-target: "//..."
            bazel-test-target: >-
              //...
              -//score/language/safecpp/aborts_upon_exception:abortsuponexception_toolchain_test
              -//score/os/test:acl_test
              -//score/os/test:errno_test
              -//score/os/test:socket_test
            bazel-test-extra-flags: "--test_timeout=180,900,2700,10800" # Increase test timeout due to QEMU emulation
          - name: x86_64-linux (examples/integration)
            bazel-config: x86_64-linux
            working-directory: "examples/integration"
            bazel-build-target: "//..."
            bazel-test-target: "//..."
            bazel-test-extra-flags: ""
    steps:
      - uses: eclipse-score/more-disk-space@6a3b48901846bf7f8cc985925157d71a8973e61f # v1
        with:
          level: 4
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}-${{ matrix.name }}
      - name: Install QEMU
        if: matrix.bazel-config == 'bl-aarch64-linux'
        run: |
          sudo apt-get update
          sudo apt install -y qemu-user
      - name: Bazel Build
        working-directory: ${{ matrix.working-directory }}
        run: |
          bazel build --config ${{ matrix.bazel-config }} -- ${{ matrix.bazel-build-target }}
      - name: Bazel Test
        working-directory: ${{ matrix.working-directory }}
        run: |
          bazel test --config ${{ matrix.bazel-config }} ${{ matrix.bazel-test-extra-flags }} -- ${{ matrix.bazel-test-target }}
      - name: Bazel mod deps
        if: matrix.working-directory == 'examples/integration'
        working-directory: ${{ matrix.working-directory }}
        run: |
          bazel mod deps --lockfile_mode=update
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-testlogs-${{ matrix.name }}
          path: ${{ matrix.working-directory }}/bazel-testlogs/**/test.log
