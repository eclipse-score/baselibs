[package]
name = "libcpp"
description = "FFI-compatible types for C++ stdlib interop across libstdc++/libc++ ABIs."
version.workspace = true
authors.workspace = true
readme.workspace = true
edition.workspace = true
license-file.workspace = true

[lib]
path = "lib.rs"

# The C++ standard library layout cannot be selected per-target by Cargo (Bazel does this via
# `select()`). `libstdcpp_layout` is the default for the Linux dev environment; build with
# `--no-default-features --features libcxx_layout` for libc++/QNX.
[features]
default = ["libstdcpp_layout"]
libstdcpp_layout = []
libcxx_layout = []

[dependencies]
libc = "0.2"
paste = "1"
libcpp_derive.workspace = true

[lints]
workspace = true
