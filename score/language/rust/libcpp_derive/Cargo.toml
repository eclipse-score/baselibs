[package]
name = "libcpp_derive"
description = "Procedural macros supporting the `libcpp` FFI layout bindings."
version.workspace = true
authors.workspace = true
readme.workspace = true
edition.workspace = true
license-file.workspace = true

[lib]
proc-macro = true
path = "lib.rs"

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[lints]
workspace = true
